<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html, body {
  height:100%; overflow:hidden;
  font-family:-apple-system,"Helvetica Neue",Helvetica,Arial,sans-serif;
  background:#fff; color:#111;
  font-size:13px; -webkit-font-smoothing:antialiased;
}

/* ── HEADER ── */
#hdr {
  height:52px; background:#fff;
  border-bottom:1px solid #e5e5e5;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  position:fixed; top:0; left:0; right:0; z-index:300;
}
#hdr-l { display:flex; align-items:center; gap:10px; min-width:0; }
#hdr-logo { width:30px; height:30px; border-radius:50%; object-fit:cover; flex-shrink:0; }
#hdr-title { font-size:13px; font-weight:600; color:#111; letter-spacing:-.1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#hdr-r { display:flex; align-items:center; gap:10px; flex-shrink:0; }
#updated { font-size:11px; color:#999; white-space:nowrap; }
#refresh-btn {
  font-size:11px; font-weight:500; color:#111;
  background:none; border:none; cursor:pointer;
  font-family:inherit; padding:0; letter-spacing:-.1px;
  display:flex; align-items:center; gap:4px;
}
#refresh-btn:hover { color:#555; }

/* ── FILTER BAR ── */
#filters {
  height:42px; background:#fff;
  border-bottom:1px solid #e5e5e5;
  display:flex; align-items:center; gap:10px; padding:0 20px;
  position:fixed; top:52px; left:0; right:0; z-index:300;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
#filters::-webkit-scrollbar { display:none; }
.flbl { font-size:10px; font-weight:500; letter-spacing:.8px; text-transform:uppercase; color:#999; flex-shrink:0; }
.fsep { width:1px; height:14px; background:#e5e5e5; flex-shrink:0; margin:0 2px; }
.fwrap { position:relative; flex-shrink:0; }
.fsel {
  appearance:none; background:#fff; border:none;
  border-bottom:1px solid #111;
  color:#111; padding:3px 18px 3px 0;
  font-size:12px; font-weight:500; font-family:inherit;
  cursor:pointer; outline:none;
  border-radius:0;
}
.fsel option { background:#fff; color:#111; }
.fcaret { position:absolute; right:2px; top:50%; transform:translateY(-50%); pointer-events:none; color:#999; font-size:8px; }

/* ── MAIN ── */
#main {
  position:fixed;
  top:94px; left:0; right:0; bottom:0;
  display:flex; flex-direction:column;
}

/* ── MAP ── */
#map-wrap { flex:0 0 55%; position:relative; min-height:180px; }
#map { width:100%; height:100%; }

.legend {
  position:absolute; bottom:14px; right:14px; z-index:500;
  background:rgba(255,255,255,0.95);
  border:1px solid #e5e5e5;
  border-radius:6px; padding:8px 12px;
  font-family:-apple-system,"Helvetica Neue",sans-serif;
  pointer-events:none;
}
.legend-title { font-size:9px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:#999; margin-bottom:5px; }
.leg-row { display:flex; align-items:center; gap:7px; margin:3px 0; font-size:11px; color:#333; }
.leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ── DIVIDER ── */
#div { height:1px; background:#e5e5e5; flex-shrink:0; }

/* ── TABLE SECTION ── */
#tbl-section { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#fff; }

#search-wrap { padding:8px 20px; border-bottom:1px solid #e5e5e5; flex-shrink:0; display:flex; align-items:center; gap:10px; }
#search {
  flex:1; background:none; border:none;
  border-bottom:1px solid #e5e5e5; color:#111;
  padding:5px 0; font-size:12px; font-family:inherit; outline:none;
  transition:border-color .15s;
}
#search::placeholder { color:#bbb; font-style:normal; }
#search:focus { border-bottom-color:#111; }
#rec-count { font-size:11px; color:#999; white-space:nowrap; flex-shrink:0; }

/* stats */
#stats-row {
  padding:6px 20px; border-bottom:1px solid #f0f0f0;
  display:flex; gap:16px; flex-wrap:wrap; flex-shrink:0;
  background:#fafafa;
}
.sstat { display:flex; align-items:center; gap:5px; font-size:11px; color:#777; }
.sstat b { color:#111; font-weight:600; }
.sdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* table head */
#tbl-head {
  display:grid; grid-template-columns:120px 1fr 150px 120px;
  padding:0 20px; height:30px; align-items:center;
  border-bottom:1px solid #e5e5e5; flex-shrink:0;
  background:#fafafa;
}
.th { font-size:10px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color:#999; cursor:pointer; user-select:none; display:flex; align-items:center; gap:3px; }
.th.act { color:#111; }

#tbl-body { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
#tbl-body::-webkit-scrollbar { width:3px; }
#tbl-body::-webkit-scrollbar-thumb { background:#e5e5e5; border-radius:2px; }

.row {
  display:grid; grid-template-columns:120px 1fr 150px 120px;
  padding:0 20px; height:38px; align-items:center;
  border-bottom:1px solid #f5f5f5;
  cursor:pointer; transition:background .1s;
}
.row:hover  { background:#fafafa; }
.row:active { background:#f5f5f5; }
.row.hl     { background:#f5f5f5; }

.td { font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:8px; }
.td-apn  { color:#aaa; font-size:11px; font-variant-numeric:tabular-nums; font-family:"Helvetica Neue",monospace; }
.td-addr { color:#111; font-weight:500; }
.td-cap  { color:#777; font-size:11px; }

/* status chips — line style, no fill */
.chip { display:inline-block; padding:2px 7px; border-radius:3px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
.cp { border:1px solid #16a34a; color:#16a34a; }
.cc { border:1px solid #7c3aed; color:#7c3aed; }
.ca { border:1px solid #b45309; color:#b45309; }
.cd { border:1px solid #1d4ed8; color:#1d4ed8; }
.cn { border:1px solid #dc2626; color:#dc2626; }
.cx { border:1px solid #9ca3af; color:#9ca3af; }

/* Leaflet popup */
.leaflet-popup-content-wrapper {
  background:#fff; border:1px solid #e5e5e5;
  border-radius:8px; color:#111;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
.leaflet-popup-tip { background:#fff; }
.leaflet-popup-content { margin:12px 14px; font-family:-apple-system,"Helvetica Neue",sans-serif; }
.pop-addr { font-size:13px; font-weight:600; color:#111; margin-bottom:8px; line-height:1.35; }
.pop-row { display:flex; justify-content:space-between; gap:16px; margin:4px 0; }
.pop-k { font-size:11px; color:#999; }
.pop-v { font-size:11px; font-weight:500; color:#111; }

/* loading */
#loading {
  position:fixed; inset:0; z-index:9999; background:#fff;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
.spin { width:24px; height:24px; border:2px solid #e5e5e5; border-top-color:#111; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#load-t { font-size:14px; font-weight:600; color:#111; }
#load-m { font-size:12px; color:#999; }

/* ── MOBILE ≤ 640px ── */
@media (max-width:640px) {
  #hdr { height:48px; padding:0 16px; }
  #filters { top:48px; height:40px; padding:0 16px; }
  #main { top:88px; }
  #hdr-title { font-size:12px; }
  #updated { display:none; }
  #map-wrap { flex:0 0 40%; }
  #tbl-head { display:none; }
  .row {
    display:flex; flex-direction:column;
    height:auto; padding:10px 16px; gap:1px; align-items:flex-start;
  }
  .td { padding-right:0; white-space:normal; }
  .td-addr { font-size:13px; font-weight:600; order:1; }
  .td-apn  { font-size:10px; order:2; }
  .td-cap  { font-size:10px; order:3; }
  .td-stat { order:4; margin-top:3px; }
  #search-wrap { padding:7px 16px; }
  #stats-row { padding:5px 16px; gap:12px; }
}
</style>
</head>

<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6CaSItN1ctobH8NfdYzIlha6xd_LwNR6OpSYdS7WvWcJ1wq0qq0HdUH5rMfmHm8eKpbp2Ic6oViK3/pub?gid=678670005&single=true&output=csv";
const PROXY = u => "https://corsproxy.io/?" + encodeURIComponent(u);

const S_COLOR = {
  "no application":"#dc2626","applied":"#b45309",
  "permitted":"#16a34a","demolition":"#1d4ed8",
  "construction":"#7c3aed","under construction":"#7c3aed","unknown":"#9ca3af"
};
const S_CHIP = {
  "no application":"chip cn","applied":"chip ca",
  "permitted":"chip cp","demolition":"chip cd",
  "construction":"chip cc","under construction":"chip cc","unknown":"chip cx"
};
function skey(s){ return (s||"").toLowerCase().trim(); }
function scolor(s){ return S_COLOR[skey(s)]||"#9ca3af"; }
function schip(s) { return S_CHIP[skey(s)]||"chip cx"; }

const map = L.map("map",{center:[34.036,-118.735],zoom:12,preferCanvas:true});
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
  attribution:"© OpenStreetMap © CARTO",subdomains:"abcd",maxZoom:20
}).addTo(map);

let allParcels=[],filtered=[],markers={},selectedApn=null;
let sortK="address",sortD=1;
let apnMap={},parcelLayer=null,dotsGroup=null;

const PROXY_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6CaSItN1ctobH8NfdYzIlha6xd_LwNR6OpSYdS7WvWcJ1wq0qq0HdUH5rMfmHm8eKpbp2Ic6oViK3/pub?gid=678670005&single=true&output=csv";

function buildParcels(geojson){
  if(parcelLayer) map.removeLayer(parcelLayer);
  parcelLayer=L.geoJSON(geojson,{
    style:feat=>{
      const r=apnMap[String(feat.properties.id||"")];
      if(!r) return{fillColor:"transparent",color:"rgba(0,0,0,0.18)",weight:0.7,fillOpacity:0};
      const c=scolor(r.status);
      return{fillColor:c,color:c,weight:1.5,fillOpacity:0.28,opacity:0.85};
    },
    onEachFeature:(feat,layer)=>{
      const r=apnMap[String(feat.properties.id||"")];
      if(!r) return;
      layer.on("mouseover",function(){this.setStyle({weight:2,fillOpacity:0.45});});
      layer.on("mouseout", function(){parcelLayer.resetStyle(this);});
      layer.on("click",e=>{selectedApn=r.apn;showPopup(e.latlng,r);highlightRow(r.apn);});
    }
  }).addTo(map);
}

function renderMarkers(){
  if(dotsGroup) map.removeLayer(dotsGroup);
  dotsGroup=L.layerGroup(); markers={};
  filtered.forEach(p=>{
    if(!p.lat||!p.lng) return;
    const sk=skey(p.status);
    if(!sk||sk==="unknown") return;
    const c=scolor(p.status);
    const sel=p.apn===selectedApn;
    const m=L.circleMarker([p.lat,p.lng],{
      radius:sel?8:5, fillColor:c,
      color:sel?"#fff":"rgba(0,0,0,0.15)",
      weight:sel?2:1, fillOpacity:0.95
    });
    m.on("click",()=>{selectedApn=p.apn;renderMarkers();showPopup([p.lat,p.lng],p);highlightRow(p.apn);});
    markers[p.apn]=m; dotsGroup.addLayer(m);
  });
  dotsGroup.addTo(map);
}

function showPopup(latlng,p){
  L.popup({closeButton:false,maxWidth:260})
    .setLatLng(latlng)
    .setContent(
      "<div class=\"pop-addr\">"+( p.address||"unknown address")+"</div>"+
      "<div class=\"pop-row\"><span class=\"pop-k\">apn</span><span class=\"pop-v\">"+( p.apn||"—")+"</span></div>"+
      "<div class=\"pop-row\"><span class=\"pop-k\">zone captain</span><span class=\"pop-v\">"+( p.ambassador||"—")+"</span></div>"+
      "<div class=\"pop-row\"><span class=\"pop-k\">status</span><span class=\""+schip(p.status)+"\">"+( p.status||"unknown")+"</span></div>"+
      (p.notes?"<div style=\"margin-top:7px;font-size:11px;color:#999;line-height:1.4\">"+p.notes+"</div>":"")
    ).openOn(map);
}

function highlightRow(apn){
  document.querySelectorAll(".row").forEach(r=>r.classList.toggle("hl",r.dataset.apn===apn));
  const el=document.querySelector(".row[data-apn=\""+apn+"\"]");
  if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function sortBy(key,el){
  if(sortK===key)sortD*=-1; else{sortK=key;sortD=1;}
  document.querySelectorAll("#tbl-head .th span").forEach(s=>s.textContent="");
  document.querySelectorAll("#tbl-head .th").forEach(t=>t.classList.remove("act"));
  el.classList.add("act");
  el.querySelector("span").textContent=sortD===1?"↑":"↓";
  renderTable();
}

function renderTable(){
  const sorted=[...filtered].sort((a,b)=>(a[sortK]||"").localeCompare(b[sortK]||"")*sortD);
  const body=document.getElementById("tbl-body");
  if(!sorted.length){
    body.innerHTML="<div style=\"padding:24px;text-align:center;color:#bbb;font-size:12px\">no parcels match your filters.</div>";
    document.getElementById("rec-count").textContent="";
    return;
  }
  const frag=document.createDocumentFragment();
  sorted.forEach(r=>{
    const div=document.createElement("div");
    div.className="row"+(r.apn===selectedApn?" hl":"");
    div.dataset.apn=r.apn;
    div.innerHTML=
      "<div class=\"td td-apn\">"+r.apn+"</div>"+
      "<div class=\"td td-addr\">"+r.address+"</div>"+
      "<div class=\"td td-cap\">"+(r.ambassador||"—")+"</div>"+
      "<div class=\"td td-stat\"><span class=\""+schip(r.status)+"\">"+r.status+"</span></div>";
    div.addEventListener("click",()=>{
      selectedApn=r.apn; renderMarkers(); highlightRow(r.apn);
      if(r.lat&&r.lng) map.setView([r.lat,r.lng],17,{animate:true});
    });
    frag.appendChild(div);
  });
  body.innerHTML=""; body.appendChild(frag);
  document.getElementById("rec-count").textContent=sorted.length.toLocaleString()+" parcels";
}

function renderStats(){
  const counts={};
  filtered.forEach(p=>{const k=skey(p.status);counts[k]=(counts[k]||0)+1;});
  const order=[["permitted","#16a34a"],["construction","#7c3aed"],["under construction","#7c3aed"],["applied","#b45309"],["demolition","#1d4ed8"],["no application","#dc2626"]];
  const seen=new Set();
  document.getElementById("stats-row").innerHTML=
    order.filter(([k])=>counts[k]&&!seen.has(k==="under construction"?"construction":k)&&seen.add(k==="under construction"?"construction":k))
         .map(([k,c])=>{
           const dk=k==="under construction"?"construction":k;
           return "<div class=\"sstat\"><div class=\"sdot\" style=\"background:"+c+"\"></div><b>"+(counts[k]||0)+"</b>&nbsp;"+dk+"</div>";
         }).join("")+
    "<div style=\"margin-left:auto\" class=\"sstat\"><b>"+filtered.length.toLocaleString()+"</b>&nbsp;total</div>";
}

function populateFilters(){
  const caps=[...new Set(allParcels.map(p=>p.ambassador).filter(Boolean))].sort();
  const stats=[...new Set(allParcels.map(p=>p.status||"unknown"))].sort();
  document.getElementById("f-cap").innerHTML="<option value=\"\">all captains</option>"+caps.map(c=>"<option>"+c+"</option>").join("");
  document.getElementById("f-stat").innerHTML="<option value=\"\">all statuses</option>"+stats.map(s=>"<option>"+s+"</option>").join("");
}

function applyFilters(){
  const q  =document.getElementById("search").value.toLowerCase().trim();
  const cap=document.getElementById("f-cap").value;
  const sta=document.getElementById("f-stat").value;
  filtered=allParcels.filter(p=>{
    const sk=skey(p.status);
    if(!sk||sk==="unknown"||sk==="") return false;
    if(cap&&p.ambassador!==cap) return false;
    if(sta&&(p.status||"unknown")!==sta) return false;
    if(q&&![p.apn,p.address,p.ambassador,p.status,p.notes].some(v=>(v||"").toLowerCase().includes(q))) return false;
    return true;
  });
  renderTable(); renderStats(); renderMarkers();
}

function parseCSV(text){
  const lines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  const out=[];
  for(let i=0;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const row=[];let cur="",inQ=false;
    for(let j=0;j<lines[i].length;j++){
      const c=lines[i][j];
      if(c==='"'){if(inQ&&lines[i][j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}
      else if(c===","&&!inQ){row.push(cur.trim());cur="";}
      else cur+=c;
    }
    row.push(cur.trim());
    out.push(row);
  }
  const hdrs=out[0].map(h=>h.replace(/^"|"$/g,"").trim());
  return out.slice(1).filter(r=>r.some(v=>v)).map(r=>{
    const obj={};
    hdrs.forEach((h,i)=>obj[h]=(r[i]||"").replace(/^"|"$/g,"").trim());
    const get=(...keys)=>{for(const k of keys){const f=Object.keys(obj).find(x=>x.toLowerCase()===k.toLowerCase());if(f&&obj[f])return obj[f];}return "";};
    return{
      apn:get("APN"),address:get("Address"),
      ambassador:get("Ambassador"),
      status:get("Status")||"unknown",
      lat:parseFloat(get("Lat"))||null,
      lng:parseFloat(get("Lng"))||null,
      notes:get("Notes"),
    };
  }).filter(p=>p.apn);
}

async function fetchCSV(){
  const t="&t="+Date.now();
  const urls=[
    SHEET_CSV_URL+t,
    "https://corsproxy.io/?"+encodeURIComponent(SHEET_CSV_URL+t),
    "https://api.allorigins.win/raw?url="+encodeURIComponent(SHEET_CSV_URL),
  ];
  for(const url of urls){
    try{
      const res=await fetch(url);
      if(!res.ok) continue;
      const text=await res.text();
      if(text.includes("APN")||text.includes("Address")) return text;
    }catch(e){continue;}
  }
  throw new Error("all sources failed");
}

async function loadData(){
  document.getElementById("tbl-body").innerHTML="<div style=\"padding:24px;text-align:center;color:#bbb;font-size:12px\">loading…</div>";
  try{
    const text=await fetchCSV();
    allParcels=parseCSV(text);
    apnMap={};
    allParcels.forEach(p=>{if(p.apn)apnMap[p.apn]=p;});
    document.getElementById("updated").textContent="updated "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    populateFilters();
    applyFilters();
  }catch(e){
    document.getElementById("tbl-body").innerHTML="<div style=\"padding:24px;text-align:center;color:#dc2626;font-size:12px\">could not load data — try refreshing.</div>";
  }
}

async function init(){
  map.zoomControl.setPosition("topleft");
  const[_]=await Promise.allSettled([
    fetch("parcels.geojson").then(r=>r.json()).then(g=>{window._geojson=g;}).catch(()=>{}),
    loadData()
  ]);
  if(window._geojson) buildParcels(window._geojson);
  document.getElementById("loading").style.display="none";
}

init();
</script>
