<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MRTF Permit Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#1f2231;
  --border:rgba(255,255,255,0.08); --text:#f0f0f0; --muted:#6b7280;
  --permitted:#34d399; --construct:#a78bfa;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  font-family:-apple-system,"Helvetica Neue",Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text);
  height:100vh; display:flex; flex-direction:column;
  font-size:13px; -webkit-font-smoothing:antialiased;
}
header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 16px; height:50px;
  display:flex; align-items:center; justify-content:space-between;
  gap:8px; flex-shrink:0;
}
header h1 { font-size:14px; font-weight:600; letter-spacing:-.1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hdr-right { display:flex; gap:8px; align-items:center; flex-shrink:0; }
#last-updated { font-size:11px; color:var(--muted); white-space:nowrap; }
.reload-btn {
  font-size:11px; background:rgba(255,255,255,0.07); color:var(--text);
  border:1px solid var(--border); border-radius:7px; padding:5px 11px;
  cursor:pointer; font-family:inherit; transition:background .15s;
}
.reload-btn:hover { background:rgba(255,255,255,0.13); }
#filter-bar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 16px; height:44px;
  display:flex; gap:8px; align-items:center; flex-shrink:0;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
#filter-bar::-webkit-scrollbar { display:none; }
#filter-bar label { font-size:10px; font-weight:600; letter-spacing:.7px; text-transform:uppercase; color:var(--muted); flex-shrink:0; }
.fsep { width:1px; height:18px; background:var(--border); flex-shrink:0; }
.fwrap { position:relative; flex-shrink:0; }
#filter-bar select {
  appearance:none; background:rgba(255,255,255,0.06); border:1px solid var(--border);
  color:var(--text); padding:5px 26px 5px 10px; border-radius:7px;
  font-size:12px; font-weight:500; font-family:inherit; cursor:pointer; outline:none;
}
#filter-bar select:focus { border-color:rgba(52,211,153,.35); }
#filter-bar select option { background:#1a1d27; }
.fcaret { position:absolute; right:8px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--muted); font-size:9px; }
#map-wrap { flex:0 0 52vh; position:relative; min-height:180px; }
#map { width:100%; height:100%; }
#legend {
  position:absolute; bottom:14px; right:14px; z-index:999;
  background:rgba(10,12,20,.9); border:1px solid var(--border);
  border-radius:9px; padding:9px 13px;
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  font-size:11px; pointer-events:none;
}
#legend strong { display:block; font-size:9px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.leg { display:flex; align-items:center; gap:7px; color:#ccc; margin:3px 0; }
.dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
#stats-bar {
  background:var(--surface2); border-bottom:1px solid var(--border);
  padding:6px 16px; display:flex; gap:14px; flex-wrap:wrap; flex-shrink:0;
}
.stat-chip { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
.stat-chip .dot { width:7px; height:7px; }
.stat-num { font-weight:700; color:var(--text); }
#list-section { flex:1 1 0; overflow-y:auto; display:flex; flex-direction:column; }
#search-bar {
  position:sticky; top:0; z-index:10;
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:8px 16px; display:flex; gap:8px; align-items:center; flex-shrink:0;
}
#search-bar input {
  flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border);
  color:var(--text); padding:7px 12px; border-radius:7px;
  font-size:13px; font-family:inherit; outline:none;
}
#search-bar input::placeholder { color:var(--muted); }
#search-bar input:focus { border-color:rgba(52,211,153,.4); }
#record-count { font-size:11px; color:var(--muted); white-space:nowrap; flex-shrink:0; }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead th {
  background:var(--surface2); padding:0 10px; height:32px;
  text-align:left; font-size:10px; text-transform:uppercase;
  letter-spacing:.5px; color:var(--muted);
  position:sticky; top:49px; z-index:5;
  border-bottom:1px solid var(--border); white-space:nowrap; cursor:pointer;
}
thead th:hover { color:var(--text); }
tbody tr { border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer; transition:background .1s; }
tbody tr:hover { background:rgba(255,255,255,.03); }
tbody tr.highlighted { background:rgba(52,211,153,.07) !important; }
td { padding:8px 10px; vertical-align:middle; }
td.apn { font-family:monospace; color:var(--muted); font-size:11px; white-space:nowrap; }
td.address { font-weight:500; color:var(--text); }
td.cap { color:var(--muted); font-size:11px; }
.badge { display:inline-block; padding:2px 8px; border-radius:5px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; white-space:nowrap; }
.s-none         { background:rgba(239,68,68,.14);   color:#f87171; }
.s-applied      { background:rgba(245,158,11,.14);  color:#fbbf24; }
.s-permitted    { background:rgba(52,211,153,.14);  color:#34d399; }
.s-demolition   { background:rgba(96,165,250,.14);  color:#60a5fa; }
.s-construction { background:rgba(167,139,250,.14); color:#a78bfa; }
.s-unknown      { background:rgba(107,114,128,.12); color:#6b7280; }
.loading { text-align:center; padding:30px; color:var(--muted); font-size:13px; }
.leaflet-popup-content-wrapper {
  background:rgba(18,20,30,.97); border:1px solid rgba(255,255,255,.1);
  border-radius:11px; color:var(--text); box-shadow:0 10px 40px rgba(0,0,0,.7);
}
.leaflet-popup-tip { background:rgba(18,20,30,.97); }
.leaflet-popup-content { margin:12px 14px; font-family:-apple-system,"Helvetica Neue",sans-serif; }
.pop-addr { font-size:13px; font-weight:600; color:#fff; margin-bottom:8px; line-height:1.35; }
.pop-row { display:flex; justify-content:space-between; gap:16px; margin:4px 0; }
.pop-k { font-size:11px; color:var(--muted); }
.pop-v { font-size:11px; font-weight:500; }
@media (max-width:640px) {
  header h1 { font-size:12px; }
  #last-updated { display:none; }
  #map-wrap { flex:0 0 40vh; }
  thead { display:none; }
  tbody tr { display:flex; flex-direction:column; padding:10px 16px; border-bottom:1px solid rgba(255,255,255,.06); }
  td { padding:1px 0; }
  td.address { font-size:13px; font-weight:500; }
  td.apn, td.cap { font-size:10px; }
  td:last-child { margin-top:4px; }
}
</style>
</head>
<body>

<header>
  <h1>MRTF Permit Tracker</h1>
  <div class="hdr-right">
    <span id="last-updated"></span>
    <button class="reload-btn" onclick="loadData()">↺ Refresh</button>
  </div>
</header>

<div id="filter-bar">
  <label>Captain</label>
  <div class="fwrap">
    <select id="f-ambassador" onchange="applyFilters()"><option value="">All Captains</option></select>
    <span class="fcaret">&#9660;</span>
  </div>
  <div class="fsep"></div>
  <label>Status</label>
  <div class="fwrap">
    <select id="f-status" onchange="applyFilters()"><option value="">All Statuses</option></select>
    <span class="fcaret">&#9660;</span>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="legend">
    <strong>Permit Status</strong>
    <div class="leg"><div class="dot" style="background:#34d399"></div>Permitted</div>
    <div class="leg"><div class="dot" style="background:#a78bfa"></div>Under Construction</div>
  </div>
</div>

<div id="stats-bar"></div>

<div id="list-section">
  <div id="search-bar">
    <input type="search" id="search" autocomplete="off" autocorrect="off" autocapitalize="off"
           placeholder="Search address, APN, zone captain..." oninput="applyFilters()"/>
    <span id="record-count"></span>
  </div>
  <div id="table-wrap"><div class="loading">Loading parcels...</div></div>
</div>

<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6CaSItN1ctobH8NfdYzIlha6xd_LwNR6OpSYdS7WvWcJ1wq0qq0HdUH5rMfmHm8eKpbp2Ic6oViK3/pub?gid=678670005&single=true&output=csv";
const PROXY = u => "https://corsproxy.io/?" + encodeURIComponent(u);
const MALIBU = [34.036, -118.735];

const STATUS_COLOR = {
  "no application":"#ef4444","applied":"#f59e0b",
  "permitted":"#34d399","demolition":"#60a5fa",
  "construction":"#a78bfa","under construction":"#a78bfa","unknown":"#6b7280"
};
const STATUS_CLASS = {
  "no application":"s-none","applied":"s-applied",
  "permitted":"s-permitted","demolition":"s-demolition",
  "construction":"s-construction","under construction":"s-construction","unknown":"s-unknown"
};

let allParcels=[], filteredParcels=[], markers={}, selectedApn=null, map;
let sortCol="address", sortDir=1;
let apnMap={}, parcelLayer=null, dotsGroup=null;

const colorFor = s => STATUS_COLOR[(s||"").toLowerCase()] || "#6b7280";
const classFor = s => STATUS_CLASS[(s||"").toLowerCase()] || "s-unknown";

function initMap() {
  map = L.map("map").setView(MALIBU, 12);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
    attribution:"© OpenStreetMap © CARTO", subdomains:"abcd", maxZoom:20
  }).addTo(map);
}

function buildParcels(geojson) {
  if(parcelLayer) map.removeLayer(parcelLayer);
  parcelLayer = L.geoJSON(geojson, {
    style: feat => {
      const r = apnMap[String(feat.properties.id||"")];
      if(!r) return {fillColor:"transparent",color:"rgba(255,255,255,0.04)",weight:0.4,fillOpacity:0};
      const c = colorFor(r.status);
      return {fillColor:c, color:c, weight:1, fillOpacity:0.28, opacity:0.65};
    },
    onEachFeature: (feat, layer) => {
      const r = apnMap[String(feat.properties.id||"")];
      if(!r) return;
      layer.on("mouseover", function(){ this.setStyle({weight:2,fillOpacity:0.6}); });
      layer.on("mouseout",  function(){ parcelLayer.resetStyle(this); });
      layer.on("click", e => { selectedApn=r.apn; showPopup(e.latlng,r); highlightRow(r.apn); });
    }
  }).addTo(map);
}

function renderMarkers() {
  if(dotsGroup) map.removeLayer(dotsGroup);
  dotsGroup = L.layerGroup();
  markers = {};
  filteredParcels.forEach(p => {
    if(!p.lat||!p.lng) return;
    const sk=(p.status||"").toLowerCase();
    if(!sk||sk==="unknown") return;
    const c = colorFor(p.status);
    const sel = p.apn===selectedApn;
    const m = L.circleMarker([p.lat,p.lng],{
      radius:sel?9:5.5, fillColor:c,
      color:sel?"rgba(255,255,255,0.8)":"rgba(0,0,0,0.3)",
      weight:sel?2:1, fillOpacity:0.95
    });
    m.on("click",()=>{ selectedApn=p.apn; renderMarkers(); showPopup([p.lat,p.lng],p); highlightRow(p.apn); });
    markers[p.apn]=m;
    dotsGroup.addLayer(m);
  });
  dotsGroup.addTo(map);
}

function showPopup(latlng, p) {
  L.popup({closeButton:false, maxWidth:270})
    .setLatLng(latlng)
    .setContent(
      "<div class=\"pop-addr\">" + (p.address||"Unknown Address") + "</div>" +
      "<div class=\"pop-row\"><span class=\"pop-k\">APN</span><span class=\"pop-v\">" + (p.apn||"—") + "</span></div>" +
      "<div class=\"pop-row\"><span class=\"pop-k\">Zone Captain</span><span class=\"pop-v\">" + (p.ambassador||"—") + "</span></div>" +
      "<div class=\"pop-row\"><span class=\"pop-k\">Status</span><span class=\"badge " + classFor(p.status) + "\">" + (p.status||"Unknown") + "</span></div>" +
      (p.notes ? "<div style=\"margin-top:7px;font-size:11px;color:#9ca3af;line-height:1.4\">" + p.notes + "</div>" : "")
    )
    .openOn(map);
}

function highlightRow(apn) {
  document.querySelectorAll("tbody tr").forEach(r=>r.classList.toggle("highlighted",r.dataset.apn===apn));
  const el=document.querySelector("tr[data-apn=\""+apn+"\"]");
  if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function sortBy(col) {
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=1;}
  filteredParcels.sort((a,b)=>{
    const av=(a[col]||"").toString().toLowerCase();
    const bv=(b[col]||"").toString().toLowerCase();
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  renderTable(filteredParcels);
}

function renderTable(data) {
  const wrap=document.getElementById("table-wrap");
  if(!data.length){wrap.innerHTML="<div class=\"loading\">No parcels match your filters.</div>";return;}
  const arrow=k=>sortCol===k?(sortDir===1?" &uarr;":" &darr;"):"";
  let h="<table><thead><tr>" +
    "<th onclick=\"sortBy('apn')\">APN"+arrow("apn")+"</th>" +
    "<th onclick=\"sortBy('address')\">Address"+arrow("address")+"</th>" +
    "<th onclick=\"sortBy('ambassador')\">Zone Captain"+arrow("ambassador")+"</th>" +
    "<th onclick=\"sortBy('status')\">Status"+arrow("status")+"</th>" +
    "</tr></thead><tbody>";
  data.forEach(p=>{
    h+="<tr data-apn=\""+p.apn+"\" onclick=\"selectParcel('"+p.apn+"',true)\">" +
      "<td class=\"apn\">"+p.apn+"</td>" +
      "<td class=\"address\">"+p.address+"</td>" +
      "<td class=\"cap\">"+(p.ambassador||"—")+"</td>" +
      "<td><span class=\"badge "+classFor(p.status)+"\">"+p.status+"</span></td>" +
      "</tr>";
  });
  h+="</tbody></table>";
  wrap.innerHTML=h;
  document.getElementById("record-count").textContent=data.length+" parcel"+(data.length!==1?"s":"");
  if(selectedApn) document.querySelectorAll("tbody tr").forEach(r=>r.classList.toggle("highlighted",r.dataset.apn===selectedApn));
}

function renderStats(data) {
  const counts={};
  data.forEach(p=>{const k=(p.status||"unknown").toLowerCase();counts[k]=(counts[k]||0)+1;});
  const order=[["permitted","#34d399"],["construction","#a78bfa"],["under construction","#a78bfa"],["applied","#f59e0b"],["demolition","#60a5fa"],["no application","#ef4444"]];
  const seen=new Set();
  document.getElementById("stats-bar").innerHTML=
    order.filter(([k])=>counts[k]&&!seen.has(k==="under construction"?"construction":k)&&seen.add(k==="under construction"?"construction":k))
         .map(([k,c])=>{const dk=k==="under construction"?"construction":k;return "<div class=\"stat-chip\"><div class=\"dot\" style=\"background:"+c+"\"></div><span class=\"stat-num\">"+(counts[k]||0)+"</span>&nbsp;"+dk+"</div>";})
         .join("") +
    "<div style=\"margin-left:auto\" class=\"stat-chip\"><span class=\"stat-num\">"+data.length.toLocaleString()+"</span>&nbsp;total</div>";
}

function selectParcel(apn, fromList) {
  selectedApn=apn;
  renderMarkers();
  const p=allParcels.find(x=>x.apn===apn);
  if(p&&p.lat&&p.lng) map.setView([p.lat,p.lng],17,{animate:true});
  highlightRow(apn);
}

function populateFilters() {
  const ambs=[...new Set(allParcels.map(p=>p.ambassador).filter(Boolean))].sort();
  const stats=[...new Set(allParcels.map(p=>p.status||"Unknown"))].sort();
  document.getElementById("f-ambassador").innerHTML="<option value=\"\">All Captains</option>"+ambs.map(a=>"<option>"+a+"</option>").join("");
  document.getElementById("f-status").innerHTML="<option value=\"\">All Statuses</option>"+stats.map(s=>"<option>"+s+"</option>").join("");
}

function applyFilters() {
  const q  =document.getElementById("search").value.toLowerCase().trim();
  const amb=document.getElementById("f-ambassador").value;
  const sta=document.getElementById("f-status").value;
  filteredParcels=allParcels.filter(p=>{
    if(amb&&p.ambassador!==amb) return false;
    if(sta&&(p.status||"Unknown")!==sta) return false;
    if(q&&![p.apn,p.address,p.ambassador,p.status,p.notes].some(v=>(v||"").toLowerCase().includes(q))) return false;
    return true;
  });
  renderTable(filteredParcels);
  renderStats(filteredParcels);
  renderMarkers();
}

function parseCSV(text) {
  const lines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  const out=[];
  for(let i=0;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const row=[];let cur="",inQ=false;
    for(let j=0;j<lines[i].length;j++){
      const c=lines[i][j];
      if(c==='"'){if(inQ&&lines[i][j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}
      else if(c===","&&!inQ){row.push(cur.trim());cur="";}
      else cur+=c;
    }
    row.push(cur.trim());
    out.push(row);
  }
  const hdrs=out[0].map(h=>h.replace(/^"|"$/g,"").trim());
  return out.slice(1).filter(r=>r.some(v=>v)).map(r=>{
    const obj={};
    hdrs.forEach((h,i)=>obj[h]=(r[i]||"").replace(/^"|"$/g,"").trim());
    const get=(...keys)=>{for(const k of keys){const f=Object.keys(obj).find(x=>x.toLowerCase()===k.toLowerCase());if(f&&obj[f])return obj[f];}return "";};
    return {
      apn:get("APN"), address:get("Address"),
      ambassador:get("Ambassador"),
      status:get("Status")||"Unknown",
      lat:parseFloat(get("Lat"))||null,
      lng:parseFloat(get("Lng"))||null,
      notes:get("Notes"),
    };
  }).filter(p=>p.apn);
}

async function fetchCSV() {
  const t = "&t=" + Date.now();
  const proxies = [
    SHEET_CSV_URL + t,                                                          // direct
    "https://corsproxy.io/?" + encodeURIComponent(SHEET_CSV_URL + t),          // corsproxy
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(SHEET_CSV_URL), // allorigins
  ];
  for (const url of proxies) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const text = await res.text();
      if (text.includes("APN") || text.includes("Address")) return text;
    } catch(e) { continue; }
  }
  throw new Error("all sources failed");
}

async function loadData() {
  document.getElementById("table-wrap").innerHTML="<div class=\"loading\">Loading parcels from Google Sheets...</div>";
  try {
    const text = await fetchCSV();
    allParcels = parseCSV(text);
    apnMap={};
    allParcels.forEach(p=>{ if(p.apn) apnMap[p.apn]=p; });
    document.getElementById("last-updated").textContent = "Updated " + new Date().toLocaleTimeString();
    populateFilters();
    applyFilters();
  } catch(e) {
    document.getElementById("table-wrap").innerHTML="<div class=\"loading\" style=\"color:#f87171\">Could not load data. Try refreshing.</div>";
  }
}

async function init() {
  initMap();
  // Load GeoJSON parcels and CSV in parallel
  const [_, csvResult] = await Promise.allSettled([
    fetch("parcels.geojson")
      .then(r=>r.json())
      .then(geojson=>{ window._geojson=geojson; })
      .catch(e=>console.warn("parcels.geojson not loaded:", e)),
    loadData()
  ]);
  // Build parcel shapes after both are done (apnMap populated by loadData)
  if(window._geojson) buildParcels(window._geojson);
}

init();
</script>
</body>
</html>
